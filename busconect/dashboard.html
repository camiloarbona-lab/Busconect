<!DOCTYPE html>
<html lang="es">

<head>
    <!-- Configuración técnica de la página -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>BusConnect Admin | Dashboard</title>
    
    <!-- Tipografías de Google Fonts: DM Sans para texto y Plus Jakarta Sans para títulos -->
    
    
    <!-- Estilos principales del panel administrativo -->
    <script src="js/theme-init.js"></script>
    <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/admin-style.css">
    
    <!-- Iconografía Boxicons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    
    <!-- Leaflet CSS: Requerido para el funcionamiento del mapa interactivo -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Sidebar compartido (inyectado por js/ui-shared.js) -->
    <div id="sidebar-placeholder"></div>

    <!-- ================================================================
         ÁREA DE CONTENIDO PRINCIPAL
         ================================================================ -->
    <div class="main-layout">
        
        <!-- HEADER SUPERIOR: Controles globales y estado -->
        <header class="top-bar">
            <div class="header-left">
                <!-- Botón de Hamburguesa para Sidebar (Mobile) -->
                <button id="sidebar-toggle" class="toggle-btn-fixed">
                    <i class='bx bx-menu'></i>
                </button>
                <div class="page-info">
                    <h1 class="page-title">Dashboard</h1>
                </div>
            </div>
            <div class="header-actions">
                <div class="date-chip">
                    <i class='bx bx-calendar-event'></i>
                    <span id="fecha-actual">—</span>
                </div>
            </div>
        </header>

        <!-- Contenido Central -->
        <main class="dashboard-grid">
            <!-- KPIs -->
            <div class="kpi-container">
                <div class="kpi-card">
                    <div class="kpi-content">
                        <p class="kpi-label">Flota Total (Buses)</p>
                        <h3 class="kpi-value" id="kpi-buses">—</h3>
                    </div>
                    <div class="kpi-icon brand"><i class='bx bx-navigation'></i></div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-content">
                        <p class="kpi-label">Total de Rutas</p>
                        <h3 class="kpi-value" id="kpi-rutas">—</h3>
                    </div>
                    <div class="kpi-icon success"><i class='bx bx-map-pin'></i></div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-content">
                        <p class="kpi-label">Cumplimiento</p>
                        <h3 class="kpi-value" id="kpi-cumplimiento">0%</h3>
                    </div>
                    <div class="kpi-icon info"><i class='bx bx-timer'></i></div>
                </div>
                <div class="kpi-card alert-card">
                    <div class="kpi-content">
                        <p class="kpi-label">Incidencias</p>
                        <h3 class="kpi-value" id="kpi-incidencias">—</h3>
                    </div>
                    <div class="kpi-icon error"><i class='bx bx-error-alt'></i></div>
                </div>
            </div>

            <!-- PANEL MAPA + ALERTAS -->
            <div class="monitor-row">
                <!-- Mapa en Tiempo Real -->
                <div class="monitor-panel map-panel">
                    <div class="panel-header">
                        <h3><i class='bx bx-map-alt'></i> Mapa en Tiempo Real</h3>
                        <span class="live-badge"><span class="live-dot"></span>En vivo</span>
                    </div>
                    <div id="map-leaflet" class="map-view leaflet-container"></div>
                </div>

                <!-- Alertas Recientes -->
                <div class="monitor-panel alerts-panel">
                    <div class="panel-header">
                        <h3><i class='bx bx-error-circle'></i> Alertas Recientes</h3>
                    </div>
                    <div class="alerts-list" id="alerts-list">
                        <!-- Las alertas se inyectan dinámicamente desde el JS -->
                    </div>
                </div>
            </div>

            <!-- TABLA BUSES EN SERVICIO -->
            <div class="monitor-panel buses-table-panel">
                <div class="panel-header">
                    <h3><i class='bx bx-time-five'></i> Buses en Servicio</h3>
                </div>
                <div class="table-wrapper">
                    <table class="buses-table">
                        <thead>
                            <tr>
                                <th>Placa</th>
                                <th>Ruta</th>
                                <th>Conductor</th>
                                <th>Estado</th>
                            </tr>
                        </thead>
                        <tbody id="dashboard-buses-tbody">
                            <!-- Filas inyectadas dinámicamente mediante admin-logic.js -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>

        <!-- Footer Administrativo -->
        <footer class="admin-footer">
            <div class="footer-left">
                <p>© 2026 <strong>BusConnect</strong> | SENA Santander</p>
            </div>
            <div class="footer-right">
                <span class="status-indicator">
                    <span class="dot"></span> Servidor: Bucaramanga-DC
                </span>
            </div>
        </footer>
    </div>

    <!-- FIX Punto 3: Leaflet JS — carga única (eliminada importación duplicada) -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Autenticación y sidebar compartido -->
    <script src="js/auth-guard.js"></script>
    <!-- Data Store (Base de datos local simulada) -->
    <script src="js/store.js"></script>
    <script src="js/ui-shared.js"></script>
    <!-- Simulador de Endpoint POST y Telemetría -->
    <script src="js/api-simulator.js"></script>
    <!-- Lógica y controladores del Dashboard -->
    <script src="js/admin-logic.js"></script>

</body>

</html>
