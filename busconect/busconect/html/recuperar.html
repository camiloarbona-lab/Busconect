<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
    <script src="../js/theme-init.js"></script>
    <link rel="stylesheet" href="../css/theme.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- 🔧 FIX: Marca corregida BuscoNetc → BusConnect -->
  <title>BusConnect — Recuperar Acceso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="../css/styles.css" />

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
</head>

<body>

  <!-- Blobs decorativos de fondo — sin semántica -->
  <div class="bg-deco" aria-hidden="true">
    <div class="bg-deco__blob bg-deco__blob--a"></div>
    <div class="bg-deco__blob bg-deco__blob--b"></div>
  </div>

  <div class="page">
    <header class="site-header">
      <nav aria-label="Navegación superior">
        <a href="../login.html" class="btn-volver">
          <i class="fa-solid fa-chevron-left"></i> Volver
        </a>
      </nav>
    </header>

    <div class="brand">
      <div class="brand__icon-wrap">
        <img src="../img/logo.png" alt="Logo BusConnect" class="icon icon--brand" />
      </div>
      <div class="brand__copy">
        <span class="brand__name">BusConnect</span>
      </div>
    </div>
    <!-- 🔧 FIX (Auto): Removido tag </header> huérfano -->

    <!-- ── Contenido principal ── -->
    <main class="main">

      <article class="card">

        <header class="card__header">
          <div class="card__icon-wrap" aria-hidden="true">
            <img src="../img/logo.png" alt="" class="icon--card" width="20" height="20" />
          </div>
          <div>
            <h1 class="card__title" id="js-login-heading">Recuperar </h1>
            <p class="card__subtitle">Te enviaremos un enlace a tu correo</p>
          </div>
        </header>

        <form class="form" id="js-login-form" method="post" action="/api/recovery" novalidate>

          <!-- Correo Electrónico -->
          <div class="field">
            <label class="field__label">Correo o Usuario</label>
            <div class="field__wrap">
              <input class="field__input" type="text" id="recovery-input" placeholder="correo@ejemplo.com">
            </div>
            <p id="errorRecuperar" class="field__msg" hidden>Solo letras, números, @ y puntos.</p>
          </div>

          <button class="btn-submit" type="button" id="js-btn-recuperar" onclick="validarRecuperacion()">
            <span class="btn-submit__text">Enviar instrucciones</span>
            <span class="btn-submit__spinner" aria-hidden="true"></span>
          </button>

          <!-- Enlace a login -->
          <p class="form__aux">
            ¿Recordaste tu contraseña?
            <a href="../login.html" class="link">Inicia Sesión</a>
          </p>

        </form>

      </article>

    </main>

    <!-- ── Banner demo ── -->
    <aside class="demo-banner" aria-label="Nota de demo">
      <strong>Demo:</strong> Ingresa tu correo y toca Enviar para probar
    </aside>

  </div>

<!-- 🔧 FIX (Auto): Removido punto suelto tras cierre de script -->
<script src="../js/validaciones.js"></script>
<script src="../js/app.js" type="module"></script>

</body>

</html>
