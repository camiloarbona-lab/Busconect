<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <script src="../js/theme-init.js"></script>
    <link rel="stylesheet" href="../css/theme.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- 🔧 FIX: Marca corregida BuscoNetc → BusConnect -->
    <title>BusConnect · Nueva Contraseña</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../css/styles.css" />
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="bg-deco" aria-hidden="true">
        <span class="bg-deco__blob bg-deco__blob--a"></span>
        <span class="bg-deco__blob bg-deco__blob--b"></span>
    </div>
    <div class="page">
        <header class="site-header">
            <div class="brand">
                <div class="brand__icon-wrap">
                    <img src="../img/logo.png" alt="Logo BusConnect" class="icon icon--brand" />
                </div>
                <div class="brand__copy">
                    <strong class="brand__name">BusConnect</strong>
                </div>
            </div>
        </header>
        <main class="main">
            <article class="card">
                <!-- 🔧 FIX (Auto): Estilos inline movidos a CSS -->
                <header class="card__header card__header--column">
                    <h1 class="card__title">Nueva Contraseña</h1>
                    <p class="card__subtitle">Crea una contraseña segura para tu cuenta.</p>
                </header>
                <form class="form">
                    <div class="field">
                        <label class="field__label">Nueva Contraseña</label>
                        <div class="field__wrap">
                            <input class="field__input field__input--pw" type="password" id="new-password"
                                placeholder="••••••••">
                            <button class="btn-eye" type="button" onclick="togglePassword('new-password', this)"
                                aria-label="Mostrar contraseña">
                                <!-- 🔧 FIX (Auto): Estilos inline removidos -->
                                <i class="fa-solid fa-eye icon--eye-on"></i>
                                <i class="fa-solid fa-eye-slash icon--eye-off"></i>
                            </button>
                        </div>
                        <p id="errorNuevaPass" class="field__msg" hidden></p>
                    </div>

                    <div class="field">
                        <label class="field__label">Confirmar Contraseña</label>
                        <div class="field__wrap">
                            <input class="field__input field__input--pw" type="password" id="confirm-password"
                                placeholder="••••••••">
                            <button class="btn-eye" type="button" onclick="togglePassword('confirm-password', this)"
                                aria-label="Mostrar contraseña">
                                <i class="fa-solid fa-eye icon--eye-on"></i>
                                <i class="fa-solid fa-eye-slash icon--eye-off"></i>
                            </button>
                        </div>
                        <p id="errorMatch" class="field__msg" hidden>
                            Las contraseñas deben coincidir y tener 8+ caracteres (Mayúscula, Minúscula y #).
                        </p>
                    </div>

                    <!-- reCAPTCHA -->
                    <div class="field" id="js-field-recaptcha">
                        <div class="field__wrap">
                            <div class="g-recaptcha" data-sitekey="6Ld0zuEsAAAAAMKBnHd6pPK4bpbZe9GscvzOC_VF"></div>
                        </div>
                        <span class="field__msg" id="js-recaptcha-msg" role="alert" aria-live="polite"></span>
                    </div>

                    <button class="btn-submit" type="button" id="js-btn-cambiar" onclick="finalizarCambio()">
                        <span class="btn-submit__text">Actualizar Contraseña</span>
                        <span class="btn-submit__spinner" aria-hidden="true"></span>
                    </button>
                </form>
            </article>
            <p class="form__success" id="js-form-success" role="status" aria-live="polite" hidden></p>
        </main>
    </div>
    <script src="../js/validaciones.js"></script>
</body>

</html>
