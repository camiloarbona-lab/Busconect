<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
    <script src="../js/theme-init.js"></script>
    <link rel="stylesheet" href="../css/theme.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- 🔧 FIX: Marca corregida BuscoNetc → BusConnect -->
  <title>BusConnect · Verificar Código</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="../css/styles.css" />

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <div class="bg-deco" aria-hidden="true">
    <span class="bg-deco__blob bg-deco__blob--a"></span>
    <span class="bg-deco__blob bg-deco__blob--b"></span>
  </div>

  <div class="page">
    <header class="site-header">
      <nav>
        <a href="recuperar.html" class="btn-volver">
          <i class="fa-solid fa-chevron-left"></i> Volver
        </a>
      </nav>
      <div class="brand">
        <div class="brand__icon-wrap">
          <img src="../img/logo.png" alt="Logo BusConnect" class="icon icon--brand" />
        </div>
        <div class="brand__copy">
          <strong class="brand__name">BusConnect</strong>
        </div>
      </div>
    </header>

    <main class="main">
      <article class="card">
        <!-- 🔧 FIX (Auto): Estilos inline movidos a CSS (.card__header--column) -->
        <header class="card__header card__header--column">
          <h1 class="card__title">Verificar Código</h1>
          <p class="card__subtitle">Ingresa el código de 6 dígitos que enviamos a tu correo.</p>
        </header>

        <form class="form">
          <div class="field">
            <label class="field__label">Código de Verificación</label>
            <div class="field__wrap">
              <!-- 🔧 FIX (Auto): Estilos inline movidos a CSS (.field__input--code) -->
              <input 
                class="field__input field__input--code" 
                type="text" 
                id="codigo-input" 
                placeholder="000000" 
                maxlength="6"
              >
            </div>
            <p id="errorCodigo" class="field__msg" hidden>El código debe ser de 6 números.</p>
          </div>

          <button class="btn-submit" type="button" id="js-btn-verificar" onclick="validarCodigo()">
            <span class="btn-submit__text">Verificar</span>
            <span class="btn-submit__spinner" aria-hidden="true"></span>
          </button>
        </form>
      </article>
    </main>
  </div>

<script src="../js/validaciones.js"></script>
</body>
</html>
