<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>BusConnect | Mis Novedades</title>
    
    <!-- Google Fonts -->
    
    
    <!-- Iconografía Boxicons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    
    <!-- Estilos base y específicos -->
    <script src="../js/theme-init.js"></script>
    <link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="../css/admin-style.css">
    <link rel="stylesheet" href="../css/inci-conduc.css">

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
</head>
<body class="driver-mode">

    <!-- Sidebar compartido -->
    <div id="sidebar-placeholder"></div>

    <div class="main-layout">
        
        <!-- Header superior -->
        <header class="top-bar">
            <div class="header-left">
                <button id="sidebar-toggle" class="toggle-btn-fixed">
                    <i class='bx bx-menu'></i>
                </button>
                <div class="page-info">
                    <h1 class="page-title">Centro de Notificaciones</h1>
                    <p class="page-subtitle" id="driver-name-sub">Historial de comunicaciones</p>
                </div>
            </div>
            <div class="header-actions">
                <div class="date-chip">
                    <i class='bx bx-calendar'></i>
                    <span id="fecha-actual">Cargando...</span>
                </div>
            </div>
        </header>

        <main class="incidents-grid">
            <!-- Bloque de KPIs -->
            <div class="incidents-kpi">
                <div class="kpi-mini">
                    <div class="kpi-mini-icon brand">
                        <i class='bx bx-bell'></i>
                    </div>
                    <div class="kpi-mini-data">
                        <p class="kpi-mini-label">Total Notificaciones</p>
                        <h2 class="kpi-mini-val" id="kpi-total">0</h2>
                    </div>
                </div>
                <div class="kpi-mini kpi-warn">
                    <div class="kpi-mini-icon warn">
                        <i class='bx bx-paper-plane'></i>
                    </div>
                    <div class="kpi-mini-data">
                        <p class="kpi-mini-label">Enviadas</p>
                        <h2 class="kpi-mini-val" id="kpi-abiertas">0</h2>
                    </div>
                </div>
                <div class="kpi-mini kpi-success">
                    <div class="kpi-mini-icon success">
                        <i class='bx bx-download'></i>
                    </div>
                    <div class="kpi-mini-data">
                        <p class="kpi-mini-label">Recibidas</p>
                        <h2 class="kpi-mini-val" id="kpi-resueltas">0</h2>
                    </div>
                </div>
            </div>

            <!-- Barra de búsqueda y filtro -->
            <div class="action-bar">
                <div class="search-box">
                    <i class='bx bx-search'></i>
                    <input type="text" class="search-input" id="search-input" placeholder="Buscar en historial...">
                </div>
                <select class="filter-select" id="filter-estado">
                    <option value="">Todos los tipos</option>
                    <option value="enviada">Enviadas</option>
                    <option value="recibida">Recibidas</option>
                </select>
            </div>

            <!-- Panel de lista de incidencias -->
            <div class="monitor-panel table-panel">
                <div class="panel-header">
                    <h3><i class='bx bx-history'></i> Historial de Comunicaciones</h3>
                    <span class="count-label" id="count-label">0 de 0 registros</span>
                </div>
                <div id="incidents-list-container" style="padding: 16px 20px; display: flex; flex-direction: column; gap: 12px;">
                    <!-- Dinámico -->
                </div>
            </div>
        </main>
    </div>

    <!-- Modal de detalle -->
    <div class="modal" id="modal-detail">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Detalle de Novedad</h2>
                <button class="close-modal"><i class='bx bx-x'></i></button>
            </div>
            <div class="modal-body">
                <div class="modal-data-grid" id="modal-data-grid">
                    <!-- Dinámico -->
                </div>
                <div class="modal-desc-section" id="modal-desc-section">
                    <label style="font-size: 0.72rem; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; display: block;">Descripción completa</label>
                    <p id="modal-desc-text"></p>
                </div>
            </div>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="../js/auth-guard.js"></script>
    <script src="../js/store.js"></script>
    <script src="../js/ui-shared.js"></script>
    <script src="../js/inci-conduc.js"></script>
</body>
</html>
