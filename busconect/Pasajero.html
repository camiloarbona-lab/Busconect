<!DOCTYPE html>
<!--
    BusConnect — Panel de Pasajero
    Descripción: Vista pública para pasajeros con mapa en tiempo real.
-->
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa en Tiempo Real | BusConnect</title>

    <script src="js/theme-init.js"></script>
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/estilo.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
</head>

<body class="pasajero-page">

    <!-- PANTALLA DE CARGA -->
    <div id="loader-wrapper">
        <div class="loader-content">
            <div class="loader-glow-circle">
                <img src="img/logo.png" alt="Cargando BusConnect" class="loader-img-logo">
            </div>
            <div class="loading-bar">
                <div class="progress"></div>
            </div>
            <p class="loader-text">CARGANDO PANEL</p>
        </div>
    </div>

    <!-- NAVBAR -->
    <header class="navbar navbar-solid" id="mainNav">
        <div class="nav-container">
            <a href="index.html" class="nav-logo" style="text-decoration: none;">
                <img src="img/logo.png" alt="Logotipo BusConnect" class="logo-img">
                <span class="logo-text">Bus<span>Connect</span></span>
            </a>
            <nav class="nav-links">
                <span class="nav-title">Panel de Pasajero</span>
            </nav>
            <div class="nav-actions">
                <div class="status-badge desktop-only">
                    <span class="status-dot"></span>
                    <span class="status-text">Actualizando en vivo</span>
                </div>
                <button id="theme-toggle" class="btn-icon" aria-label="Cambiar tema" style="margin-right: 10px; width: 40px; height: 40px;">
                    <i class='bx bx-moon'></i>
                </button>
                <a href="login.html" class="btn-outline nav-cta desktop-only">Ingresar</a>
                <button id="hamburger-btn" class="hamburger-btn mobile-only" aria-label="Abrir menú"
                    aria-expanded="false">☰</button>
            </div>
        </div>
    </header>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="pasajero-main">

        <!-- SECCIÓN 1: Búsqueda -->
        <section class="pasajero-search-section">
            <div class="pasajero-search-card">
                <div class="search-card-header">
                    <span class="section-label">PLANIFICA TU VIAJE</span>
                    <h2>¿A dónde vas hoy?</h2>
                    <p>Ingresa tu ubicación y destino para ver las rutas disponibles.</p>
                </div>

                <div class="search-form">
                    <!-- Campo origen -->
                    <div class="search-field origin">
                        <i class='bx bx-current-location'></i>
                        <input type="text" id="input-origen" placeholder="Haz clic en 🎯 o escribe tu dirección" autocomplete="off"
                            aria-label="Ubicación de origen">
                        <button class="btn-locate-input" id="btn-gps" title="Detectar mi ubicación GPS"
                            aria-label="Detectar ubicación por GPS">
                            <i class='bx bx-target-lock'></i>
                        </button>
                    </div>

                    <!-- Mensaje de estado GPS -->
                    <div id="gps-status-msg" class="gps-status-msg" style="display:none;"></div>

                    <div class="search-route-line">
                        <span class="route-dot origin-dot"></span>
                        <span class="route-line-bar"></span>
                        <span class="route-dot dest-dot"></span>
                    </div>

                    <!-- Campo destino -->
                    <div class="search-field destination">
                        <i class='bx bx-map-pin'></i>
                        <input type="text" id="input-destino" placeholder="¿A dónde quieres ir?" autocomplete="off"
                            aria-label="Lugar de destino">
                    </div>

                    <!-- Botón Listo -->
                    <button id="btn-listo" class="btn-listo" aria-label="Buscar rutas disponibles">
                        <i class='bx bx-search-alt'></i>
                        LISTO
                    </button>
                </div>
            </div>
        </section>

        <!-- SECCIÓN 2: Resultados (oculto hasta presionar Listo) -->
        <section class="pasajero-results-section hidden-section" id="results-section" aria-hidden="true">

            <!-- Card del Mapa -->
            <div class="map-card">
                <div class="map-card-header">
                    <div>
                        <h3><i class='bx bx-map-alt'></i> Mapa de Rutas</h3>
                        <p id="map-subtitle" class="map-subtitle-text">Buscando rutas disponibles...</p>
                    </div>
                    <button id="btn-locate-me" class="btn-icon" aria-label="Centrar en mi ubicación"
                        title="Mi ubicación">
                        <i class='bx bx-target-lock'></i>
                    </button>
                </div>
                <div class="map-card-body">
                    <div id="pasajero-map"></div>
                </div>
            </div>

            <!-- Card de Buses Cercanos -->
            <div class="buses-card">
                <div class="buses-card-header">
                    <h3><i class='bx bx-bus'></i> Autobuses Disponibles</h3>
                    <span class="buses-count-badge" id="buses-count">0</span>
                </div>
                <div class="buses-card-body" id="nearby-buses-list">
                    <p class="text-muted">Calculando rutas...</p>
                </div>
            </div>

        </section>

    </main>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <!-- Scripts Propios -->
    <script src="js/esti.js"></script>
    <script src="js/Pasajeros.js"></script>

</body>

</html>
